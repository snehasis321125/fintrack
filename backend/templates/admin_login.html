<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0b172a 0%, #1e293b 50%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(30,41,59,0.3);
            backdrop-filter: blur(10px);
        }

        .left img {
            width: 70%;
            filter: drop-shadow(0 8px 24px rgba(16,185,129,0.4));
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-card {
            width: 380px;
            background: linear-gradient(145deg, rgba(30,41,59,0.95), rgba(15,23,42,0.95));
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(123,44,191,0.2);
            border: 1px solid rgba(123,44,191,0.3);
            color: #f8fafc;
            backdrop-filter: blur(20px);
        }

        .admin-card h2 {
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #7b2cbf, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-left: 4px solid rgba(123,44,191,0.5);
            padding-left: 15px;
        }

        .admin-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border-radius: 16px;
            border: 2px solid rgba(123,44,191,0.4);
            background: rgba(31,41,55,0.9);
            color: #f8fafc;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .admin-card input:focus {
            outline: none;
            border-color: #7b2cbf;
            box-shadow: 0 0 20px rgba(123,44,191,0.4);
        }

        .admin-card input::placeholder {
            color: #94a3b8;
        }

        .admin-btn {
            width: 100%;
            padding: 16px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #7b2cbf, #a855f7);
            color: white;
            cursor: pointer;
            letter-spacing: 1px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(123,44,191,0.4);
            transition: all 0.3s ease;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(123,44,191,0.5);
        }

        .bottom-text {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            color: #cbd5e1;
        }

        .bottom-text span {
            color: #a855f7;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .bottom-text span:hover {
            color: #c084fc;
        }
    </style>
</head>
<body>

<div class="left">
    <img src="https://cdn-icons-png.flaticon.com/512/295/295128.png">
</div>

<div class="right">
    <div class="admin-card">
        <h2>Login as Admin User</h2>

        <input id="admin_email" placeholder="admin@xyz.com">
        <input id="admin_password" type="password" placeholder="********">

       <button class="admin-btn" onclick="adminLogin()">LOGIN</button>

        <div class="bottom-text">
            Forget your password?<br>
            <span>Get help signing in.</span>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
